<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZTGuard Portal — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --dark:#0a0f1e;--dark2:#0d1526;--blue:#2563eb;--blue2:#3b82f6;--blue3:#93c5fd;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--border:rgba(59,130,246,0.2); }
body { font-family:'Inter',system-ui,sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden; }
body::before { content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.12) 0%,transparent 70%);pointer-events:none; }
.login-wrap { position:relative;z-index:1;width:100%;max-width:420px;padding:0 20px; }
.logo-area { text-align:center;margin-bottom:40px; }
.logo-badge { display:inline-flex;align-items:center;gap:10px;text-decoration:none; }
.logo-icon { width:44px;height:44px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff; }
.logo-text { font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px; }
.logo-text span { color:var(--blue3); }
.login-card { background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.4); }
.card-title { font-size:20px;font-weight:700;color:#fff;margin-bottom:4px; }
.card-sub { font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:28px; }
label { display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px; }
input { width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 16px;font-size:15px;font-family:inherit;color:#fff;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:18px; }
input:focus { border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
.btn { width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.2s; }
.btn-primary { background:var(--blue);color:#fff;margin-top:6px; }
.btn-primary:hover { background:var(--blue2); }
.btn-ghost { background:transparent;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.12);margin-top:10px; }
.btn-ghost:hover { color:#fff;border-color:rgba(255,255,255,0.3); }
.btn:disabled { opacity:0.6;cursor:not-allowed; }
.msg { margin-top:16px;border-radius:8px;padding:10px 14px;font-size:13px;display:none; }
.msg.show { display:block; }
.msg-error { background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5; }
.msg-success { background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7; }
.back-link { text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.25); }
.back-link a { color:rgba(255,255,255,0.4);text-decoration:none; }
.back-link a:hover { color:#fff; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-badge">
      <div class="logo-icon">Z</div>
      <div class="logo-text">ZT<span>Guard</span></div>
    </div>
  </div>
  <div class="login-card" id="card">
    <div class="card-title" id="cardTitle">Reset Password</div>
    <div class="card-sub" id="cardSub">Enter your new password below</div>
    <form id="resetForm">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Min. 8 characters" required>
      <label>Confirm Password</label>
      <input type="password" id="confirmPass" placeholder="Repeat new password" required>
      <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
    </form>
    <div class="msg msg-error" id="errMsg"></div>
    <div class="msg msg-success" id="okMsg"></div>
  </div>
  <div class="back-link"><a href="/ztguard/login">← Back to sign in</a></div>
</div>
<script>
const BASE = '/ztguard';
const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '';

if (!token) {
  document.getElementById('cardTitle').textContent = 'Invalid Link';
  document.getElementById('cardSub').textContent = 'This reset link is missing a token.';
  document.getElementById('resetForm').style.display = 'none';
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  const ok  = document.getElementById('okMsg');
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;

  err.classList.remove('show'); ok.classList.remove('show');

  if (newPass !== confirmPass) {
    err.textContent = 'Passwords do not match';
    err.classList.add('show'); return;
  }
  if (newPass.length < 8) {
    err.textContent = 'Password must be at least 8 characters';
    err.classList.add('show'); return;
  }

  btn.disabled = true; btn.textContent = 'Resetting…';
  try {
    const resp = await fetch(BASE + '/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: newPass }),
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      document.getElementById('resetForm').style.display = 'none';
      ok.textContent = data.message + ' Redirecting to sign in…';
      ok.classList.add('show');
      setTimeout(() => window.location.href = BASE + '/login', 2500);
    } else {
      err.textContent = data.error || 'Reset failed';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Reset Password';
    }
  } catch (_) {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
});
</script>
</body>
</html>
